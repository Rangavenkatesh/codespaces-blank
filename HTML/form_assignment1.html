<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
    <table table border="1"align="center"width="60%cellspacing=5px";>
        <tbody>
        <tr>
            <th colspan="2" style="margin-bottom: 50%;"><h2>Registration Form</h2></th>
        </tr>
        <tr>
            <td style="padding:5px;"><label>Student Name:</label></td>
            <td><input type="text" name="studentName";></td>
        </tr>
        <tr>
            <td style="padding:5px;"><label>Father Name:</label></td>
            <td><input type="text" name="fatherName";></td>
        </tr>
        <tr>
            <td style="padding:5px;"><label>Mother Name:</label></td>
            <td><input type="text" name="motherName";></td>
        </tr>
        <tr>
            <td style="padding:5px;"><label>Date Of Birth:</label></td>
            <td><input type="date" name="dateOfBirth";></td>
        </tr>
        <tr>
            <td style="padding:5px;"><label>Gender:</label></td>
            <td><input type="radio" name="gender" value="Male">Male
                <input type="radio" name="gender" value="Female">Female
            </td>
        </tr>
        <tr>
            <td><label>Email:</label></td>
            <td><input type="text" name="email";></td>
        </tr>
        <tr>
            <td style="padding:5px;"><label>Mobile No.:</label></td>
            <td><input type="text" name="mobileNo";></td>
        </tr>
        <tr>
            <td style="padding:5px;"><label>Address:</label></td>
            <td><textarea rows="4" name="address";></textarea></td>
        </tr>
        <tr>
            <td style="padding:5px;"><label>State:</label></td>
            <td><input type="text" name="state";></td>
        </tr>
        <tr>
            <td style="padding:5px;"><label>City:</label></td>
            <td><input type="text" name="city";></td>
        </tr>
         <tr>
            <td style="padding:5px;"></td>
            <td><input type="button" value="Submit" name="submit";></td>
        </tr>
        </tbody>
    </table>
    </form>
</body>
</html>
